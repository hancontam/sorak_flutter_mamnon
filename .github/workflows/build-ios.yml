name: Build iOS IPA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build release IPA
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Build release IPA (unsigned)
        # No Apple Developer cert in CI yet — unsigned IPA for sideload/re-sign later.
        run: flutter build ipa --release --no-codesign

      - name: Upload release IPA
        uses: actions/upload-artifact@v4
        with:
          name: sorak-flutter-ios-ipa
          path: build/ios/ipa/**
          if-no-files-found: error
          retention-days: 14
