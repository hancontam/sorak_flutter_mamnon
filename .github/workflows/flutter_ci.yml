name: Flutter CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-apk:
    name: Analyze, test, and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Verify live API contract
        run: >-
          flutter test
          --dart-define=USE_MOCK_API=false
          test/functional/live_api_contract_functional_test.dart

      - name: Build live debug APK
        run: >-
          flutter build apk --debug
          --dart-define=USE_MOCK_API=false
          --dart-define=API_BASE_URL=http://103.69.191.210:8082/api

      - name: Upload live debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sorak-mam-non-live-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
