name: sorak_flutter_mamnon
description: "PRM393 Flutter project for Sorak Mam Non."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.2.0
  json_annotation: ^4.12.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  google_fonts: 6.3.2
  lottie: ^3.3.3
  flutter_svg: ^2.3.0
  lucide_icons_flutter: ^3.1.14+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.10.4
  flutter_lints: ^6.0.0
  json_serializable: ^6.11.3

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/loading.json
    - assets/lottie/empty.json
    - assets/lottie/success.json
    - assets/images/banner_login.jpg
    - assets/images/mascot_sorak.png
